server {
    listen 80;
    listen 443 ssl;
    server_name lolamarket.uz www.lolamarket.uz;

    ssl_certificate /etc/nginx/ssl/lolamarket.crt;
    ssl_certificate_key /etc/nginx/ssl/lolamarket.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /_next/static/ {
        alias /var/www/lolamarket/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/lolamarket/public/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
