<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LolaMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="root">

    <!-- ===== HEADER ===== -->
    <header id="app-header">
      <button id="btn-back" class="icon-btn hidden" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div id="header-brand" class="header-brand">
        <span class="header-logo-wrap">
          <img src="assets/lola-logo-tulip.jpg" width="34" height="34" alt="" class="header-logo-img">
        </span>
      </div>
      <div id="header-text" class="header-text">
        <span id="header-title" class="header-title">LolaMarket</span>
        <span id="header-sub" class="header-sub">Telegram Mini App</span>
      </div>
      <div class="header-spacer"></div>
      <button id="btn-header-search" class="icon-btn hidden" onclick="navigate('search')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn notif-btn">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M18 8.5a6 6 0 0 0-12 0c0 6-2.5 7.5-2.5 7.5h17S18 14.5 18 8.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10.2 19.5a2 2 0 0 0 3.6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span class="notif-dot"></span>
      </button>
    </header>

    <!-- ===== SCREEN CONTENT ===== -->
    <div id="screen-wrap"></div>

    <!-- ===== MAIN ACTION BUTTON (detail / checkout) ===== -->
    <div id="main-btn-bar" class="main-btn-bar hidden">
      <button class="main-action-btn" onclick="mainBtnAction()">
        <span id="main-btn-label">Savatga qo'shish</span>
        <span id="main-btn-sub" class="main-btn-sub">$0.00</span>
      </button>
    </div>

    <!-- ===== BOTTOM NAV: dark pill + profile ===== -->
    <nav id="app-nav" class="app-nav-wrap">
      <!-- 4-tab dark pomegranate pill -->
      <div class="nav-pill" id="nav-pill">
        <!-- sliding white glass lens -->
        <div id="nav-lens" class="nav-lens"></div>
        <!-- Home -->
        <button id="nav-home" class="nav-tab" onclick="tab('home')">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.2a1 1 0 0 1 .64.23l7.5 6.2a1 1 0 0 1 .36.77V19a1.5 1.5 0 0 1-1.5 1.5H15a.75.75 0 0 1-.75-.75V15a2.25 2.25 0 0 0-4.5 0v4.75A.75.75 0 0 1 9 20.5H5.5A1.5 1.5 0 0 1 4 19v-8.6a1 1 0 0 1 .36-.77l7.5-6.2a1 1 0 0 1 .64-.23z"/></svg>
          <span class="nav-label">Bosh</span>
        </button>
        <!-- Catalog -->
        <button id="nav-catalog" class="nav-tab" onclick="tab('catalog')">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><rect x="3.5" y="3.5" width="7.5" height="7.5" rx="2"/><rect x="13" y="3.5" width="7.5" height="7.5" rx="2"/><rect x="3.5" y="13" width="7.5" height="7.5" rx="2"/><rect x="13" y="13" width="7.5" height="7.5" rx="2"/></svg>
          <span class="nav-label">Katalog</span>
        </button>
        <!-- Cart -->
        <button id="nav-cart" class="nav-tab" onclick="tab('cart')">
          <span class="nav-icon-wrap">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M7.5 8V6.5a4.5 4.5 0 0 1 9 0V8h1.3a1.5 1.5 0 0 1 1.5 1.38l.9 10.5a1.5 1.5 0 0 1-1.5 1.62H5.3a1.5 1.5 0 0 1-1.5-1.62l.9-10.5A1.5 1.5 0 0 1 6.2 8H7.5zm2-1.5V8h5V6.5a2.5 2.5 0 0 0-5 0z"/></svg>
            <span id="cart-badge" class="cart-badge hidden">0</span>
          </span>
          <span class="nav-label">Savat</span>
        </button>
        <!-- Orders -->
        <button id="nav-orders" class="nav-tab" onclick="tab('orders')">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M6 3.5h9.5a1 1 0 0 1 .7.3l2.5 2.5a1 1 0 0 1 .3.7V19a1.5 1.5 0 0 1-1.5 1.5H6A1.5 1.5 0 0 1 4.5 19V5A1.5 1.5 0 0 1 6 3.5zM8 9.5h8a.75.75 0 0 0 0-1.5H8a.75.75 0 0 0 0 1.5zm0 4h8a.75.75 0 0 0 0-1.5H8a.75.75 0 0 0 0 1.5zm0 4h5a.75.75 0 0 0 0-1.5H8a.75.75 0 0 0 0 1.5z"/></svg>
          <span class="nav-label">Buyurtma</span>
        </button>
      </div>

      <!-- Separate profile pill button -->
      <button id="nav-profile" class="nav-profile-btn" onclick="tab('profile')">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M12 13.5c-4.4 0-7.5 2.7-7.5 6a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1c0-3.3-3.1-6-7.5-6z"/></svg>
      </button>
    </nav>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js?v=4"></script>
</body>
</html>
