name: Check Server Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fix port 80 and start nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== PORT 80 ISHLATAYOTGAN JARAYON ==="
            sudo ss -tlnp | grep ':80' || echo "hech narsa topilmadi"
            sudo fuser 80/tcp 2>/dev/null && echo "port 80 band" || echo "port 80 bo'sh"

            echo "=== APACHE HOLATI ==="
            sudo systemctl status apache2 --no-pager 2>/dev/null | head -4 || echo "apache2 yo'q"

            echo "=== PORT 80 NI BO'SHATISH ==="
            sudo systemctl stop apache2 2>/dev/null && echo "apache2 to'xtatildi" || true
            sudo systemctl disable apache2 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true

            echo "=== NGINX ISHGA TUSHIRISH ==="
            sudo systemctl start nginx
            sudo systemctl status nginx --no-pager | head -4

            echo "=== TEST ==="
            curl -s -o /dev/null -w "port 80: %{http_code}" http://localhost:80/
