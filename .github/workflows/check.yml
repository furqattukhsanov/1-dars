name: Check Server Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: External connectivity test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== SERVER IPv4 (to'liq) ==="
            ip -4 addr show | grep 'inet ' | awk '{print $2}'

            echo "=== CADDY CONFIG ==="
            cat /etc/caddy/Caddyfile 2>/dev/null | head -20 || echo "Caddyfile topilmadi"
            ls /etc/caddy/ 2>/dev/null || echo "caddy folder yo'q"

            echo "=== NGINX ACCESS LOG (so'nggi) ==="
            sudo tail -5 /var/log/nginx/access.log 2>/dev/null || echo "log yo'q"
            sudo tail -5 /var/log/nginx/error.log 2>/dev/null || echo "error log yo'q"

            echo "=== NGINX STATUS ==="
            sudo systemctl status nginx --no-pager | grep Active

      - name: Test server from GitHub runner
        run: |
          echo "=== GitHub runner dan serverga ulanish ==="
          curl -sv --connect-timeout 5 http://${{ secrets.SERVER_IP }}/ 2>&1 | grep -E "Connected|HTTP|Failed|refused" | head -5 || echo "ulanib bo'lmadi"
