name: Check Server Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check nginx and app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== SERVER IP ==="
            curl -s ifconfig.me
            echo ""
            echo "=== NGINX STATUS ==="
            sudo systemctl status nginx --no-pager | head -8
            echo "=== NGINX ERROR LOG ==="
            sudo journalctl -u nginx --no-pager -n 15 2>/dev/null || sudo tail -20 /var/log/nginx/error.log 2>/dev/null || echo "no log"
            echo "=== NGINX CONFIG TEST ==="
            sudo nginx -t 2>&1
            echo "=== OUR CONFIG FILE ==="
            cat /etc/nginx/sites-available/lolamarket 2>/dev/null | head -20
            echo "=== PORT 3000 ==="
            curl -s -o /dev/null -w "port 3000: %{http_code}" http://localhost:3000/
            echo ""
            echo "=== PORT 80 ==="
            curl -s -o /dev/null -w "port 80: %{http_code}" http://localhost:80/ || echo "port 80: no response"
