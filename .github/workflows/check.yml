name: Check Server Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSL and nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== SELF-SIGNED SSL YARATISH ==="
            sudo mkdir -p /etc/nginx/ssl
            sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout /etc/nginx/ssl/lolamarket.key \
              -out /etc/nginx/ssl/lolamarket.crt \
              -subj "/C=UZ/ST=Tashkent/L=Tashkent/O=LolaMarket/CN=lolamarket.uz" 2>/dev/null
            echo "SSL yaratildi ✅"

            echo "=== NGINX CONFIG YANGILASH ==="
            sudo cp /var/www/lolamarket/nginx.conf /etc/nginx/sites-available/lolamarket
            sudo nginx -t 2>&1

            echo "=== UFW 443 RUXSAT ==="
            sudo ufw allow 443/tcp 2>/dev/null || true

            echo "=== NGINX RESTART ==="
            sudo systemctl restart nginx
            sleep 1
            sudo systemctl status nginx --no-pager | grep Active

            echo "=== TEST ==="
            curl -sk -o /dev/null -w "https://localhost: %{http_code}" https://localhost/
            echo ""
            curl -s -o /dev/null -w "http://localhost: %{http_code}" http://localhost/
