name: Build & Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cp ecosystem.config.js deploy/
          cp nginx.conf deploy/

      - name: Setup server (first time)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Node.js va PM2 yo'q bo'lsa o'rnatadi
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            sudo mkdir -p /var/www/lolamarket
            sudo chown -R $USER:$USER /var/www/lolamarket

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/"
          target: /tmp/lolamarket-deploy
          strip_components: 1

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Deploy fayllarni joyiga ko'chirish
            rsync -a --delete /tmp/lolamarket-deploy/ /var/www/lolamarket/
            rm -rf /tmp/lolamarket-deploy

            # SSL sertifikat yo'q bo'lsa yaratish
            if [ ! -f /etc/nginx/ssl/lolamarket.crt ]; then
              sudo mkdir -p /etc/nginx/ssl
              sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /etc/nginx/ssl/lolamarket.key \
                -out /etc/nginx/ssl/lolamarket.crt \
                -subj "/C=UZ/ST=Tashkent/L=Tashkent/O=LolaMarket/CN=lolamarket.uz" 2>/dev/null
            fi

            # Nginx config yangilash
            sudo cp /var/www/lolamarket/nginx.conf /etc/nginx/sites-available/lolamarket
            sudo ln -sf /etc/nginx/sites-available/lolamarket /etc/nginx/sites-enabled/lolamarket
            sudo ufw allow 80/tcp 2>/dev/null || true
            sudo ufw allow 443/tcp 2>/dev/null || true
            sudo nginx -t

            # Caddy ni to'xtatish (port band qilmasligi uchun)
            sudo systemctl stop caddy 2>/dev/null || true
            sudo systemctl disable caddy 2>/dev/null || true

            # Nginx ishga tushirish yoki qayta yuklash
            if sudo systemctl is-active --quiet nginx; then
              sudo systemctl reload nginx
            else
              sudo systemctl start nginx
              sudo systemctl enable nginx
            fi

            # PM2 bilan ishga tushirish
            cd /var/www/lolamarket
            pm2 delete lolamarket 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # Server IP ni chiqarish (DNS uchun)
            echo "=== SERVER IPv4 ==="
            curl -s -4 ifconfig.me || hostname -I | awk '{print $1}'
            echo "=== SERVER IPv6 ==="
            curl -s -6 ifconfig.me || true

            echo ""
            echo "✅ Deploy muvaffaqiyatli! App: http://$(curl -s -4 ifconfig.me):3000"
