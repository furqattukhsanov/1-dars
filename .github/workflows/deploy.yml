name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # sayt-eski/ — demo/ va admin/ shu papkadagi eski style.css'ga bog'liq, tushirib qoldirilmasin
          source: "index.html,style.css,script.js,Photo/,sayt-eski/,demo/,admin/"
          target: /var/www/lolamarket

      # DIQQAT: bu yerda ilgari nginx konfiguratsiyasini qayta yozadigan qadam bor edi.
      # U /api/ proxy bloklarini (telegram-notify, telegram-webhook, telegram-contact,
      # order-status) o'chirib yuborardi va har push'da Telegram bildirishnomalarini
      # ishdan chiqarardi. Nginx konfiguratsiyasi endi faqat qo'lda boshqariladi —
      # kanonik nusxa: /etc/nginx/sites-available/lolamarket (serverda).
      - name: Verify nginx /api proxies survived
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            COUNT=$(grep -c 'location /api' /etc/nginx/sites-available/lolamarket || echo 0)
            echo "nginx /api bloklari: $COUNT (kutilgan: 4)"
            if [ "$COUNT" -lt 4 ]; then
              echo "::error::nginx /api proxy bloklari yo'qolgan — Telegram bildirishnomalari ishlamaydi!"
              exit 1
            fi
            echo "✅ Deploy tugadi, nginx /api proxylari joyida"
