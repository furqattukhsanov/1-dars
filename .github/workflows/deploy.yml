name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,style.css,script.js,Photo/"
          target: /var/www/lolamarket

      - name: Switch nginx to static mode & stop PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # PM2 ni to'xtatish
            pm2 stop lolamarket 2>/dev/null || true
            pm2 delete lolamarket 2>/dev/null || true

            # Nginx config — static HTML
            sudo tee /etc/nginx/sites-available/lolamarket > /dev/null <<'EOF'
            server {
                listen 80;
                listen 443 ssl;
                server_name lolamarket.uz www.lolamarket.uz;

                ssl_certificate /etc/nginx/ssl/lolamarket.crt;
                ssl_certificate_key /etc/nginx/ssl/lolamarket.key;
                ssl_protocols TLSv1.2 TLSv1.3;

                root /var/www/lolamarket;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF

            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Coming soon sahifasi faollashtirildi"
